<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Home</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .section {
            margin-bottom: 50px;
        }

        .card {
            padding: 10px;
            border: 1px solid #ddd;
            margin: 10px 0;
            border-radius: 8px;
        }

        img {
            margin-top: 5px;
        }
    </style>
</head>

<body>

<h1>Portfolio Home Page</h1>

<!-- SKILLS SECTION -->
<div class="section">
    <h2>Tech Stack</h2>
    <div id="skills"></div>
</div>

<!-- PROJECTS SECTION -->
<div class="section">
    <h2>Projects</h2>
    <div id="projects"></div>
</div>

<script>
/* ---------------- SKILLS ---------------- */
fetch('/api/v1/stacks/')
.then(response => response.json())
.then(data => {

    const container = document.getElementById('stacks')

    let html = ""

    data.forEach(stack => {
        html += `
            <div class="card">
                <h3>${stack.name}</h3>
            </div>
        `
    })

    container.innerHTML = html
})


/* ---------------- PROJECTS ---------------- */
fetch('/api/v1/projects/')
.then(response => response.json())
.then(data => {

    const container = document.getElementById('projects')

    let html = ""

    data.forEach(project => {
        html += `
            <div class="card">
                <h3>${project.title}</h3>
                <p>${project.description ?? ''}</p>
                ${project.image ? `<img src="${project.image}" width="50">` : ''}
            </div>
        `
    })

    container.innerHTML = html
})

</script>

</body>
</html>
