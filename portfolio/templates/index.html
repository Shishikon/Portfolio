<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Home</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .section {
            margin-bottom: 50px;
        }

        .card {
            padding: 10px;
            border: 1px solid #ddd;
            margin: 10px 0;
            border-radius: 8px;
        }

        img {
            margin-top: 5px;
        }
    </style>
</head>

<body>

<h1>Portfolio Home Page</h1>

<!-- SKILLS SECTION -->
<div class="section">
    <h2>Tech Stack</h2>
    <div id="skills"></div>
</div>

<!-- PROJECTS SECTION -->
<div class="section">
    <h2>Projects</h2>
    <div id="projects"></div>
</div>

<!-- ABOUT SECTION -->
<div class="section">
    <h2>About</h2>
    <div id="about"></div>
</div>

<!-- EDUCATION SECTION -->
<div class="section">
    <h2>Education</h2>
    <div id="education"></div>
</div>


<!-- CERTIFICATIONS SECTION -->
<div class="section">
    <h2>Certifications</h2>
    <div id="certifications"></div>
</div>

<script>
/* ---------------- SKILLS ---------------- */
fetch('/api/v1/stacks/')
.then(response => response.json())
.then(data => {

    const container = document.getElementById('stacks')

    let html = ""

    data.forEach(stack => {
        html += `
            <div class="card">
                <h3>${stack.name}</h3>
            </div>
        `
    })

    container.innerHTML = html
})

/* ---------------- SKILLS ---------------- */




/* ---------------- PROJECTS ---------------- */
fetch('/api/v1/projects/')
.then(response => response.json())
.then(data => {

    const container = document.getElementById('projects')

    let html = ""

    data.forEach(project => {
        html += `
            <div class="card">
                <h3>${project.title}</h3>
                <p>${project.description ?? ''}</p>
                ${project.image ? `<img src="${project.image}" width="50">` : ''}
            </div>
        `
    })

    container.innerHTML = html
})
/* ---------------- PROJECTS ---------------- */




/* ---------------- ABOUT ---------------- */
fetch('/api/v1/about/')
.then(response => response.json())
.then(data => {

    const container = document.getElementById('about')

    let html = ""

    data.forEach(ab => {
        html += `
            <div class="card">
                <h3>${ab.full_name}</h3>
                <p>${ab.profession ?? ''}</p>
                ${ab.profile_image ? `<img src="${ab.profile_image}" width="50">` : ''}
            </div>
        `
    })

    container.innerHTML = html
})
/* ---------------- ABOUT ---------------- */



/* ---------------- EDUCATION ---------------- */
fetch('/api/v1/education/')
.then(response => response.json())
.then(data => {

    const container = document.getElementById('education')

    let html = ""

    data.forEach(edu => {
        html += `
            <div class="card">
                <h3>${edu.institution}</h3>
                <p>${edu.degree ?? ''}</p>
                <p>${edu.field_of_study ?? ''}</p>
            </div>
        `
    })

    container.innerHTML = html
})
/* ---------------- EDUCATION ---------------- */



/* ---------------- CERTIFICATIONS ---------------- */
fetch('/api/v1/certifications/')
.then(response => response.json())
.then(data => {

    const container = document.getElementById('certifications')

    let html = ""

    data.forEach(certification => {
        html += `
            <div class="card">
                <h3>${certification.title}</h3>
                <p>${certification.organization ?? ''}</p>
                ${certification.image ? `<img src="${certification.image}" width="50">` : ''}
            </div>
        `
    })

    container.innerHTML = html
})
/* ---------------- CERTIFICATIONS ---------------- */




</script>

</body>
</html>
